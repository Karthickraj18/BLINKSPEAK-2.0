<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BlinkSpeak Caretaker</title>

    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#080C14">
    <link rel="manifest"
        href="data:application/manifest+json;base64,eyJuYW1lIjoiQmxpbmtTcGVhayBDYXJldGFrZXIiLCJzaG9ydF9uYW1lIjoiQ2FyZXRha2VyIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzA4MEMxNCIsInRoZW1lX2NvbG9yIjoiIzA4MEMxNCJ9">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #080C14;
            --bg-card: #0F1520;
            --accent-cyan: #00FFE0;
            --accent-red: #FF3355;
            --accent-green: #22C77A;
            --text-main: #FFFFFF;
            --text-muted: #94A3B8;
            --border-subtle: rgba(255, 255, 255, 0.05);
            --shadow-card: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            user-select: none;
        }

        button {
            font-family: inherit;
            border: none;
            cursor: pointer;
            outline: none;
        }

        input {
            font-family: inherit;
            outline: none;
        }

        /* Screens */
        .screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
        }

        .screen.active {
            display: flex;
        }

        /* Setup Screen */
        #setup-screen {
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: radial-gradient(circle at top, #111A29 0%, var(--bg-body) 100%);
        }

        .setup-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            padding: 30px 24px;
            border-radius: 20px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-subtle);
        }

        .setup-card h1 {
            font-size: 24px;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 800;
        }

        .setup-card h1 span {
            color: var(--accent-cyan);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #080C14;
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: border 0.3s;
        }

        .form-group input:focus {
            border-color: var(--accent-cyan);
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            background: var(--accent-cyan);
            color: #000;
            font-size: 16px;
            font-weight: 800;
            border-radius: 12px;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-primary:active {
            opacity: 0.8;
        }

        /* Dashboard Screen */
        #dashboard-screen {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(15, 21, 32, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-subtle);
        }

        .patient-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .conn-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent-red);
            transition: background 0.3s;
        }

        .conn-dot.live {
            background: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
            animation: pulseDot 2s infinite;
        }

        @keyframes pulseDot {
            0% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(0.9);
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        .patient-name {
            font-weight: 800;
            font-size: 18px;
            line-height: 1.2;
        }

        .patient-bed {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .top-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .time-display {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 14px;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            font-size: 18px;
        }

        .icon-btn.active {
            color: var(--accent-red);
            background: rgba(255, 51, 85, 0.1);
        }

        /* Container Content */
        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        /* Vitals Section */
        .vitals-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .vitals-card {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
        }

        .vitals-card.hr-card {
            grid-column: 1 / -1;
            border: 1px solid rgba(0, 255, 224, 0.1);
        }

        .vitals-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .hr-val {
            font-size: 48px;
            font-weight: 900;
            color: var(--accent-cyan);
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .hr-val span {
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 600;
        }

        /* ECG Animation */
        .ecg-container {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 60%;
            height: 100%;
            opacity: 0.3;
            pointer-events: none;
        }

        .ecg-line {
            fill: none;
            stroke: var(--accent-cyan);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: ecgDash 3s linear infinite;
        }

        @keyframes ecgDash {
            to {
                stroke-dashoffset: 0;
            }
        }

        .stat-val {
            font-size: 32px;
            font-weight: 800;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Section Headings */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 12px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 800;
        }

        .section-action {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: none;
        }

        /* Alerts List */
        .alerts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .alert-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: var(--shadow-card);
            position: relative;
            overflow: hidden;
            border-left: 4px solid var(--accent-cyan);
            animation: slideIn 0.3s ease-out;
            transition: opacity 0.3s, transform 0.3s;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert-card.critical {
            border-left-color: var(--accent-red);
            animation: slideIn 0.3s, pulseBorder 2s infinite;
        }

        @keyframes pulseBorder {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 51, 85, 0.4);
            }

            70% {
                box-shadow: 0 0 0 10px rgba(255, 51, 85, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 51, 85, 0);
            }
        }

        .alert-card.ack {
            border-left-color: var(--accent-green);
            opacity: 0.6;
            transform: scale(0.98);
        }

        .alert-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .alert-cat {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .alert-time {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .alert-msg {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            line-height: 1.3;
        }

        .critical .alert-msg {
            color: var(--accent-red);
        }

        .btn-ack {
            background: rgba(34, 199, 122, 0.1);
            color: var(--accent-green);
            font-weight: 700;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            width: 100%;
            border: 1px solid rgba(34, 199, 122, 0.2);
            transition: 0.2s;
        }

        .btn-ack:active {
            background: var(--accent-green);
            color: #000;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px dashed var(--border-subtle);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* History */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }

        .hist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            font-size: 14px;
        }

        .hist-time {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 12px;
            min-width: 60px;
        }

        .hist-msg {
            flex: 1;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hist-cat {
            font-size: 11px;
            padding: 4px 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .hist-item.critical .hist-cat {
            color: var(--accent-red);
            background: rgba(255, 51, 85, 0.1);
        }

        /* Status Strip */
        .status-strip {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #0B1019;
            border-top: 1px solid var(--border-subtle);
            padding: 12px 20px;
            display: flex;
            justify-content: space-around;
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            z-index: 100;
        }

        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .status-val {
            color: #fff;
            font-size: 14px;
            font-weight: 800;
        }

        /* Emergency Overlay */
        #emerg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--accent-red);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        #emerg-overlay.active {
            display: flex;
            animation: flashEmerg 0.5s infinite alternate;
        }

        @keyframes flashEmerg {
            from {
                background: #E60000;
            }

            to {
                background: #FF3355;
            }
        }

        .emerg-title {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .emerg-patient {
            font-size: 24px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 700;
            margin-bottom: 40px;
        }

        .btn-emerg-ack {
            background: #fff;
            color: var(--accent-red);
            font-size: 20px;
            font-weight: 900;
            padding: 20px 40px;
            border-radius: 100px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .btn-emerg-ack:active {
            transform: scale(0.95);
        }

        /* Test Mode Button */
        .test-btn {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #334155;
            color: #fff;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
            box-shadow: var(--shadow-card);
            z-index: 90;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0.7;
            transition: 0.2s;
        }

        .test-btn:hover {
            opacity: 1;
        }

        #test-menu {
            display: none;
            position: fixed;
            bottom: 120px;
            right: 20px;
            background: var(--bg-card);
            padding: 12px;
            border-radius: 12px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-subtle);
            z-index: 90;
            flex-direction: column;
            gap: 8px;
        }

        #test-menu.show {
            display: flex;
        }

        .test-action {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            text-align: left;
        }
    </style>
</head>

<body>

    <!-- Setup Screen -->
    <div id="setup-screen" class="screen active">
        <div class="setup-card">
            <h1>BlinkSpeak <span>Caretaker</span></h1>
            <div class="form-group">
                <label>Patient Name & Location</label>
                <input type="text" id="patient-input" placeholder="e.g. Rajan - Bed 3">
            </div>
            <div class="form-group">
                <label>Device IP</label>
                <input type="text" id="ip-input" placeholder="192.168.1.100">
            </div>
            <div class="form-group">
                <label>Port</label>
                <input type="number" id="port-input" value="8765">
            </div>
            <button class="btn-primary" id="btn-connect">Start Monitoring</button>
            <button id="btn-demo"
                style="width: 100%; padding: 16px; background: transparent; color: var(--accent-cyan); border: 2px solid var(--accent-cyan); font-size: 16px; font-weight: 800; border-radius: 12px; margin-top: 10px; transition: 0.2s; cursor: pointer;">Demo
                Mode</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="dashboard-screen" class="screen">
        <div class="topbar">
            <div class="patient-info">
                <div id="conn-indicator" class="conn-dot"></div>
                <div>
                    <div class="patient-name" id="display-name">Patient Name</div>
                    <div class="patient-bed" id="display-loc">Monitoring...</div>
                </div>
            </div>
            <div class="top-actions">
                <div class="time-display" id="clock">12:00 PM</div>
                <button class="icon-btn" id="btn-mute" title="Mute Alerts">🔔</button>
                <button class="icon-btn" id="btn-settings" title="Settings">⚙️</button>
            </div>
        </div>

        <div class="content">
            <!-- Vitals -->
            <div class="vitals-grid">
                <div class="vitals-card hr-card">
                    <div class="vitals-label">Heart Rate</div>
                    <div class="hr-val" id="val-hr">-- <span>BPM</span></div>
                    <div class="ecg-container">
                        <svg viewBox="0 0 500 100" preserveAspectRatio="none" style="width:100%; height:100%;">
                            <path class="ecg-line" d="M0,50 L100,50 L120,20 L140,90 L160,10 L180,70 L200,50 L500,50">
                            </path>
                        </svg>
                    </div>
                </div>
                <div class="vitals-card">
                    <div class="vitals-label">SpO2</div>
                    <div class="stat-val" style="color:var(--accent-green)" id="val-spo2">--%</div>
                </div>
                <div class="vitals-card">
                    <div class="vitals-label">Patient State</div>
                    <div class="stat-val" style="font-size:24px; color:#fff;" id="val-state">Idle</div>
                    <div class="stat-sub" id="val-eye">Eye: Open</div>
                </div>
            </div>

            <!-- Active Alerts -->
            <div>
                <div class="section-header">
                    <div class="section-title">Active Alerts</div>
                    <span class="section-action" id="active-count">0 pending</span>
                </div>

                <div id="active-alerts-container" class="alerts-list">
                    <!-- Cards will be injected here -->
                    <div class="empty-state" id="empty-alerts">
                        <div class="empty-icon">✓</div>
                        <div>All clear — no pending alerts</div>
                    </div>
                </div>
            </div>

            <!-- History -->
            <div>
                <div class="section-header">
                    <div class="section-title">History</div>
                    <button class="section-action" id="btn-clear-hist">Clear</button>
                </div>
                <div id="history-container" class="history-list">
                    <!-- History items -->
                </div>
            </div>
        </div>

        <!-- Status Strip -->
        <div class="status-strip">
            <div class="status-item">
                <span>Alerts Today</span>
                <span class="status-val" id="stat-total">0</span>
            </div>
            <div class="status-item">
                <span>Last Ack</span>
                <span class="status-val" id="stat-lastack">--:--</span>
            </div>
        </div>
    </div>

    <!-- Emergency Overlay -->
    <div id="emerg-overlay">
        <div class="emerg-title">EMERGENCY</div>
        <div class="emerg-patient" id="emerg-patient-name">Patient Name</div>
        <button class="btn-emerg-ack" id="btn-emerg-ack">ACKNOWLEDGE EMERGENCY</button>
    </div>

    <!-- Test Mode -->
    <button class="test-btn" id="btn-test-toggle">🧪 TEST MODE</button>
    <div id="test-menu">
        <button class="test-action" onclick="app.simAlert('normal')">Sim: Normal Alert</button>
        <button class="test-action" onclick="app.simAlert('critical')">Sim: Critical Alert</button>
        <button class="test-action" onclick="app.simAlert('emergency')">Sim: EMERGENCY</button>
        <button class="test-action" onclick="app.simVitals()">Sim: Vitals Update</button>
    </div>

    <script>
        const app = {
            ws: null,
            audioCtx: null,
            settings: { patient: '', ip: '', port: '8765', muted: false },
            state: {
                alerts: [],       // active
                history: [],      // max 100
                totalToday: 0,
                lastAckTime: null,
                vitals: { hr: '--', spo2: '--', state: 'Idle', eye: 'unknown' },
                isEmergency: false,
                connected: false,
                reconnectTimer: null
            },

            init() {
                this.loadData();
                this.bindEvents();
                this.updateClock();
                setInterval(() => this.updateClock(), 1000);

                // Request Notification Permission
                if ("Notification" in window) {
                    Notification.requestPermission();
                }

                if (this.settings.ip) {
                    document.getElementById('patient-input').value = this.settings.patient;
                    document.getElementById('ip-input').value = this.settings.ip;
                    document.getElementById('port-input').value = this.settings.port;
                    // Auto connect if everything is present
                    if (this.settings.patient && this.settings.ip) {
                        this.connect();
                    }
                }
            },

            loadData() {
                try {
                    const savedSettings = localStorage.getItem('bs_caretaker_settings');
                    if (savedSettings) this.settings = { ...this.settings, ...JSON.parse(savedSettings) };

                    const savedHist = localStorage.getItem('bs_caretaker_history');
                    if (savedHist) this.state.history = JSON.parse(savedHist);

                    const savedStats = localStorage.getItem('bs_caretaker_stats');
                    if (savedStats) {
                        const stats = JSON.parse(savedStats);
                        // Reset today count if different day (simplified logic: check date string)
                        const today = new Date().toDateString();
                        if (stats.date === today) {
                            this.state.totalToday = stats.total || 0;
                            this.state.lastAckTime = stats.lastAck || null;
                        }
                    }
                    this.renderHistory();
                    this.updateStatsBar();
                    this.updateMuteUI();
                } catch (e) { console.error('Load error', e); }
            },

            saveData() {
                localStorage.setItem('bs_caretaker_settings', JSON.stringify(this.settings));
                localStorage.setItem('bs_caretaker_history', JSON.stringify(this.state.history));
                localStorage.setItem('bs_caretaker_stats', JSON.stringify({
                    date: new Date().toDateString(),
                    total: this.state.totalToday,
                    lastAck: this.state.lastAckTime
                }));
            },

            bindEvents() {
                document.getElementById('btn-demo').addEventListener('click', () => {
                    this.settings.patient = "Demo Patient - Bed 1";

                    document.getElementById('setup-screen').classList.remove('active');
                    document.getElementById('dashboard-screen').classList.add('active');

                    document.getElementById('display-name').innerText = "Demo Patient";
                    document.getElementById('display-loc').innerText = "Bed 1 (Demo)";

                    this.initAudio();

                    // Visual override for Demo connection
                    const indicator = document.getElementById('conn-indicator');
                    indicator.className = 'conn-dot live';
                    indicator.style.backgroundColor = 'var(--accent-cyan)';
                    indicator.style.boxShadow = '0 0 10px var(--accent-cyan)';

                    if (this.state.alerts.length === 0) {
                        setTimeout(() => this.simAlert('normal'), 1000);
                        setTimeout(() => this.simAlert('critical'), 5000);
                    }

                    if (this.demoInterval) clearInterval(this.demoInterval);
                    this.demoInterval = setInterval(() => this.simVitals(), 3000);
                });

                document.getElementById('btn-connect').addEventListener('click', () => {
                    const pat = document.getElementById('patient-input').value.trim();
                    const ip = document.getElementById('ip-input').value.trim();
                    const port = document.getElementById('port-input').value.trim();
                    if (!pat || !ip) { alert("Patient name and IP are required."); return; }

                    this.settings.patient = pat;
                    this.settings.ip = ip;
                    this.settings.port = port || '8765';
                    this.saveData();
                    this.connect();
                });

                document.getElementById('btn-settings').addEventListener('click', () => {
                    if (this.ws) { this.ws.close(); this.ws = null; }
                    if (this.demoInterval) clearInterval(this.demoInterval);
                    document.getElementById('dashboard-screen').classList.remove('active');
                    document.getElementById('setup-screen').classList.add('active');
                });

                document.getElementById('btn-mute').addEventListener('click', () => {
                    this.settings.muted = !this.settings.muted;
                    this.updateMuteUI();
                    this.saveData();
                });

                document.getElementById('btn-clear-hist').addEventListener('click', () => {
                    if (confirm("Clear all history?")) {
                        this.state.history = [];
                        this.saveData();
                        this.renderHistory();
                    }
                });

                document.getElementById('btn-emerg-ack').addEventListener('click', () => {
                    this.state.isEmergency = false;
                    document.getElementById('emerg-overlay').classList.remove('active');
                    this.state.lastAckTime = Date.now();
                    this.saveData();
                    this.updateStatsBar();
                });

                document.getElementById('btn-test-toggle').addEventListener('click', () => {
                    const menu = document.getElementById('test-menu');
                    menu.classList.toggle('show');
                });
            },

            updateTimeAgo() {
                document.querySelectorAll('.time-ago').forEach(el => {
                    const ts = parseInt(el.getAttribute('data-ts'));
                    const diff = Math.floor((Date.now() - ts) / 60000);
                    if (diff < 1) el.innerText = "Just now";
                    else if (diff === 1) el.innerText = "1 min ago";
                    else el.innerText = diff + " mins ago";
                });
            },

            updateClock() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                this.updateTimeAgo();
            },

            updateMuteUI() {
                const btn = document.getElementById('btn-mute');
                if (this.settings.muted) {
                    btn.innerText = "🔕"; btn.classList.add('active');
                } else {
                    btn.innerText = "🔔"; btn.classList.remove('active');
                }
            },

            initAudio() {
                if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
            },

            playTone(type) {
                if (this.settings.muted) return;
                this.initAudio();
                const t = this.audioCtx.currentTime;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();

                osc.connect(gain);
                gain.connect(this.audioCtx.destination);

                if (type === 'normal') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, t); // C5
                    osc.frequency.exponentialRampToValueAtTime(659.25, t + 0.1); // E5
                    gain.gain.setValueAtTime(0, t);
                    gain.gain.linearRampToValueAtTime(0.5, t + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
                    osc.start(t);
                    osc.stop(t + 0.5);
                } else if (type === 'critical') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(880, t);
                    osc.frequency.setValueAtTime(1108.73, t + 0.2);
                    osc.frequency.setValueAtTime(880, t + 0.4);
                    gain.gain.setValueAtTime(0.5, t);
                    gain.gain.linearRampToValueAtTime(0, t + 0.8);
                    osc.start(t);
                    osc.stop(t + 0.8);
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                } else if (type === 'emergency') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, t);
                    osc.frequency.linearRampToValueAtTime(800, t + 0.2);
                    gain.gain.setValueAtTime(0.8, t);
                    gain.gain.setValueAtTime(0.8, t + 0.4);
                    gain.gain.linearRampToValueAtTime(0, t + 0.5);
                    osc.start(t);
                    osc.stop(t + 0.5);

                    // Loop
                    let loops = 0;
                    const interval = setInterval(() => {
                        loops++;
                        if (!this.state.isEmergency || loops > 20) { clearInterval(interval); return; }
                        this.playTone('emergency_loop');
                    }, 500);
                    if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]);
                } else if (type === 'emergency_loop') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, t);
                    osc.frequency.linearRampToValueAtTime(800, t + 0.2);
                    gain.gain.setValueAtTime(0.8, t);
                    gain.gain.linearRampToValueAtTime(0, t + 0.4);
                    osc.start(t);
                    osc.stop(t + 0.4);
                }
            },

            showBrowserNotification(title, body, tag) {
                if (Notification.permission === "granted") {
                    new Notification(title, { body, tag, icon: 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="50" fill="%2300FFE0"/></svg>' });
                }
            },

            connect() {
                // UI Setup
                document.getElementById('setup-screen').classList.remove('active');
                document.getElementById('dashboard-screen').classList.add('active');

                const parts = this.settings.patient.split('-');
                document.getElementById('display-name').innerText = parts[0]?.trim() || "Patient";
                document.getElementById('display-loc').innerText = parts[1]?.trim() || "Monitoring";

                this.initAudio(); // required on user interaction

                this.createWebSocket();
            },

            createWebSocket() {
                const url = `ws://${this.settings.ip}:${this.settings.port}`;
                console.log("Connecting to", url);

                try {
                    this.ws = new WebSocket(url);

                    this.ws.onopen = () => {
                        console.log("WS Connected");
                        this.state.connected = true;
                        document.getElementById('conn-indicator').className = 'conn-dot live';
                        if (this.state.reconnectTimer) { clearInterval(this.state.reconnectTimer); this.state.reconnectTimer = null; }
                    };

                    this.ws.onmessage = (msg) => this.handleMessage(msg.data);

                    this.ws.onclose = () => {
                        console.log("WS Closed");
                        this.state.connected = false;
                        document.getElementById('conn-indicator').className = 'conn-dot';
                        this.scheduleReconnect();
                    };

                    this.ws.onerror = (e) => {
                        console.error("WS Error", e);
                    };
                } catch (e) {
                    console.error("WS Init Error", e);
                    this.scheduleReconnect();
                }
            },

            scheduleReconnect() {
                if (!this.state.reconnectTimer) {
                    this.state.reconnectTimer = setInterval(() => {
                        console.log("Attempting reconnect...");
                        this.createWebSocket();
                    }, 5000);
                }
            },

            handleMessage(dataStr) {
                try {
                    const data = JSON.parse(dataStr);
                    if (data.type === 'alert') {
                        this.addAlert(data);
                    } else if (data.type === 'emergency') {
                        this.triggerEmergency(data);
                    } else if (data.type === 'vitals') {
                        this.updateVitals(data);
                    } else if (data.type === 'eye') {
                        document.getElementById('val-eye').innerText = `Eye: ${data.state}`;
                    } else if (data.type === 'status') {
                        document.getElementById('val-state').innerText = data.state;
                        document.getElementById('val-state').style.color = data.state === 'active' ? 'var(--accent-cyan)' : '#fff';
                    }
                } catch (e) {
                    console.error("Parse msg error", e);
                }
            },

            getCategoryIcon(cat) {
                const c = cat.toLowerCase();
                if (c.includes('need')) return '💧';
                if (c.includes('move')) return '🛏️';
                if (c.includes('comfort')) return '❄️';
                if (c.includes('emerg')) return '⚠️';
                return '💬';
            },

            addAlert(data) {
                const alert = {
                    id: Date.now() + Math.random(),
                    ts: Date.now(),
                    msg: data.message,
                    cat: data.category || 'Alert',
                    icon: this.getCategoryIcon(data.category || ''),
                    urgency: data.urgency || 'normal' // normal, critical
                };

                this.state.alerts.unshift(alert);
                this.state.history.unshift({ ...alert, ackTime: null });
                if (this.state.history.length > 100) this.state.history.pop();

                this.state.totalToday++;
                this.saveData();

                this.renderActiveAlerts();
                this.renderHistory();
                this.updateStatsBar();

                this.playTone(alert.urgency);
                this.showBrowserNotification(
                    `${alert.icon} ${alert.cat} - ${this.settings.patient}`,
                    alert.msg,
                    alert.id
                );
            },

            triggerEmergency(data) {
                this.state.isEmergency = true;
                const overlay = document.getElementById('emerg-overlay');
                document.getElementById('emerg-patient-name').innerText = this.settings.patient;
                overlay.classList.add('active');

                this.playTone('emergency');
                this.showBrowserNotification(`🚨 EMERGENCY 🚨`, `${this.settings.patient} triggered an emergency!`, 'emerg');

                const alert = {
                    id: Date.now(), ts: Date.now(), msg: data.message || "EMERGENCY ACTIVATED",
                    cat: "Emergency", icon: "🚨", urgency: "critical"
                };
                this.state.history.unshift({ ...alert, ackTime: Date.now() }); // Auto ack in history, managed by overlay
                this.state.totalToday++;
                this.saveData();
                this.renderHistory();
                this.updateStatsBar();
            },

            updateVitals(data) {
                if (data.heart_rate) document.getElementById('val-hr').innerHTML = `${data.heart_rate} <span>BPM</span>`;
                if (data.spo2) document.getElementById('val-spo2').innerText = `${data.spo2}%`;
            },

            ackAlert(id) {
                const idx = this.state.alerts.findIndex(a => a.id === id);
                if (idx > -1) {
                    const al = this.state.alerts[idx];

                    // visual update before remove
                    const card = document.getElementById(`alert-${id}`);
                    if (card) card.classList.add('ack');

                    setTimeout(() => {
                        this.state.alerts.splice(idx, 1);
                        this.renderActiveAlerts();
                    }, 500);

                    // update history
                    const hIdx = this.state.history.findIndex(h => h.id === id);
                    if (hIdx > -1) {
                        this.state.history[hIdx].ackTime = Date.now();
                    }

                    this.state.lastAckTime = Date.now();
                    this.saveData();
                    this.renderHistory();
                    this.updateStatsBar();
                }
            },

            renderActiveAlerts() {
                const cont = document.getElementById('active-alerts-container');
                const empty = document.getElementById('empty-alerts');
                document.getElementById('active-count').innerText = `${this.state.alerts.length} pending`;

                if (this.state.alerts.length === 0) {
                    empty.style.display = 'block';
                    // clear others
                    Array.from(cont.children).forEach(c => { if (c.id !== 'empty-alerts') c.remove(); });
                    return;
                }
                empty.style.display = 'none';

                // We'll just re-render all for simplicity, can be optimized D3 join style if needed
                Array.from(cont.children).forEach(c => { if (c.id !== 'empty-alerts') c.remove(); });

                this.state.alerts.forEach(a => {
                    const div = document.createElement('div');
                    div.className = `alert-card ${a.urgency}`;
                    div.id = `alert-${a.id}`;
                    div.innerHTML = `
                        <div class="alert-top">
                            <span class="alert-cat">${a.icon} ${a.cat}</span>
                            <span class="alert-time time-ago" data-ts="${a.ts}">Just now</span>
                        </div>
                        <div class="alert-msg">${a.msg}</div>
                        <button class="btn-ack" onclick="app.ackAlert(${a.id})">Acknowledge ✓</button>
                    `;
                    cont.appendChild(div);
                });
                this.updateTimeAgo();
            },

            renderHistory() {
                const cont = document.getElementById('history-container');
                cont.innerHTML = '';
                this.state.history.forEach(h => {
                    const t = new Date(h.ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    const div = document.createElement('div');
                    div.className = `hist-item ${h.urgency}`;
                    div.innerHTML = `
                        <span class="hist-time">${t}</span>
                        <span class="hist-cat">${h.cat}</span>
                        <div class="hist-msg">${h.msg}</div>
                        ${h.ackTime ? `<span style="color:var(--accent-green)">✓</span>` : `<span>⏳</span>`}
                    `;
                    cont.appendChild(div);
                });
            },

            updateStatsBar() {
                document.getElementById('stat-total').innerText = this.state.totalToday;
                if (this.state.lastAckTime) {
                    document.getElementById('stat-lastack').innerText = new Date(this.state.lastAckTime).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                }
            },

            // --- TEST SIMULATION functions ---
            simAlert(type) {
                document.getElementById('test-menu').classList.remove('show');
                if (type === 'emergency') {
                    this.handleMessage(JSON.stringify({ type: 'emergency', message: 'EMERGENCY' }));
                } else if (type === 'critical') {
                    this.handleMessage(JSON.stringify({ type: 'alert', message: 'I cannot breathe', category: 'Emergency', urgency: 'critical' }));
                } else {
                    this.handleMessage(JSON.stringify({ type: 'alert', message: 'Water Needed', category: 'Basic Needs', urgency: 'normal' }));
                }
            },

            simVitals() {
                document.getElementById('test-menu').classList.remove('show');
                const hr = Math.floor(65 + Math.random() * 25);
                const spo2 = Math.floor(95 + Math.random() * 5);
                this.handleMessage(JSON.stringify({ type: 'vitals', heart_rate: hr, spo2: spo2 }));
                // Also toggle eye state to show it works
                const state = Math.random() > 0.5 ? 'open' : 'closed';
                this.handleMessage(JSON.stringify({ type: 'eye', state: state }));
            }
        };

        window.onload = () => app.init();
    </script>
</body>
